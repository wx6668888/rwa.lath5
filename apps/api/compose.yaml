services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: rwa
      POSTGRES_PASSWORD: rwa_local_only
      POSTGRES_DB: rwa_lat_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rwa -d rwa_lat_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - rwa-lat-postgres:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

volumes:
  rwa-lat-postgres:
